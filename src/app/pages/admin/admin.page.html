<app-admin-header titlePage="Painel de Gestão" [showMenuButton]="true" [showBackButton]="false"></app-admin-header>

<div class="admin-master-tabs">
  <div class="tabs-container">
    <button class="master-tab" [class.active]="activeTab === 'metrics'" [routerLink]="['/admin/metrics']">
      <ion-icon [name]="activeTab === 'metrics' ? 'analytics' : 'analytics-outline'"></ion-icon>
      Métricas
    </button>
    <button class="master-tab" [class.active]="activeTab === 'products'" [routerLink]="['/admin/products']">
      <ion-icon [name]="activeTab === 'products' ? 'cube' : 'cube-outline'"></ion-icon>
      Produtos
    </button>
    <button class="master-tab" [class.active]="activeTab === 'chats'" [routerLink]="['/admin/chats']">
      <ion-icon [name]="activeTab === 'chats' ? 'chatbubbles' : 'chatbubbles-outline'"></ion-icon>
      Conversas
    </button>
    <button class="master-tab" [class.active]="activeTab === 'banners'" [routerLink]="['/admin/banners']">
      <ion-icon [name]="activeTab === 'banners' ? 'images' : 'images-outline'"></ion-icon>
      Banners
    </button>
    <button class="master-tab" [class.active]="activeTab === 'bots'" [routerLink]="['/admin/bots']">
      <ion-icon [name]="activeTab === 'bots' ? 'hardware-chip' : 'hardware-chip-outline'"></ion-icon>
      Bots
    </button>
    <button class="master-tab" [class.active]="activeTab === 'users'" [routerLink]="['/admin/users']">
      <ion-icon [name]="activeTab === 'users' ? 'people' : 'people-outline'"></ion-icon>
      Usuários
    </button>
    <button class="master-tab" [class.active]="activeTab === 'melhor-envio'" [routerLink]="['/admin/melhor-envio']">
      <ion-icon [name]="activeTab === 'melhor-envio' ? 'paper-plane' : 'paper-plane-outline'"></ion-icon>
      Melhor Envio
    </button>
    <button class="master-tab master-tab--isolated" [class.active]="activeTab === 'whatsapp'" [routerLink]="['/admin/whatsapp']">
      <ion-icon [name]="activeTab === 'whatsapp' ? 'logo-whatsapp' : 'logo-whatsapp'"></ion-icon>
      WhatsApp
    </button>
  </div>
</div>

<div class="admin-tab-content">
  <app-admin-metrics *ngIf="activeTab === 'metrics'"></app-admin-metrics>
  <app-dev-products *ngIf="activeTab === 'products'"></app-dev-products>
  <app-manage-chats *ngIf="activeTab === 'chats'"></app-manage-chats>
  <app-manage-banners *ngIf="activeTab === 'banners'"></app-manage-banners>
  <app-manage-whatsapp *ngIf="activeTab === 'whatsapp'"></app-manage-whatsapp>
  <app-bots *ngIf="activeTab === 'bots'"></app-bots>
  <app-manage-users *ngIf="activeTab === 'users'"></app-manage-users>
  <app-melhor-envio *ngIf="activeTab === 'melhor-envio'"></app-melhor-envio>
</div>
