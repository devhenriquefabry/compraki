<ion-content class="manage-whatsapp-content">
  <app-admin-panel-hero
    eyebrow="Atendimento multicanal"
    title="Configuração de WhatsApp"
    description="Gerencie instâncias multi-atendimento conectadas por QR Code e defina gatilhos automáticos."
    (refreshClick)="loadInstances()">
  </app-admin-panel-hero>

  <app-admin-subtabs
    [options]="subtabOptions"
    [activeTab]="activeSubTab"
    (activeTabChange)="setActiveSubTab($event)">
  </app-admin-subtabs>

  @if (errorMessage) {
    <div class="page-feedback error">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMessage }}</span>
    </div>
  }

  @if (activeSubTab === 'instances') {
    <app-whatsapp-instances-panel
      [instances]="instances"
      [isLoading]="isLoading"
      (instancesChanged)="loadInstances()">
    </app-whatsapp-instances-panel>
  } @else if (activeSubTab === 'triggers') {
    <app-whatsapp-triggers-panel [instances]="instances"></app-whatsapp-triggers-panel>
  } @else if (activeSubTab === 'chats') {
    <app-whatsapp-chats-panel
      [instances]="instances"
      [active]="activeSubTab === 'chats'">
    </app-whatsapp-chats-panel>
  } @else {
    <app-whatsapp-docs-panel></app-whatsapp-docs-panel>
  }

  @if (activeSubTab !== 'chats') {
    <div style="height: 40px;"></div>
  }
</ion-content>
