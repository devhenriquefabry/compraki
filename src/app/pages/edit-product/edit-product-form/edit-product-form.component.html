<div class="upload-container">
  <!-- LOGO BRANDING -->
  <div class="form-logo-top">
    <img src="assets/imagens/logo-devmode-notice.png" alt="Compraki Devmode">
  </div>

  <!-- BANNER TOPO REAL -->
  <div class="announce-banner-real">
    <img src="assets/imagens/banner-anunciar.png" alt="Anunciar Produto">
  </div>

  <form action="" [formGroup]="editProductForm">
    <!-- SEÇÃO FOTOS -->
    <div class="section-title">
      <div class="dot"></div>
      <span>Fotos do Produto</span>
    </div>
    
    <div class="photos-grid">
      <div class="add-photo-box" (click)="fileInput.click()">
        <ion-icon name="camera-outline"></ion-icon>
        <span>+ Adicionar Fotos</span>
        <small>Arquivos novos</small>
        <input #fileInput type="file" multiple (change)="onFileSelected($event)" style="display: none;">
      </div>

      <div class="photo-item" *ngFor="let photo of selectedPhotos; let i = index">
        <img [src]="photo" alt="Preview">
        <div class="remove-photo" (click)="removePhoto(i)">
          <ion-icon name="close"></ion-icon>
        </div>
      </div>

      <div class="photo-placeholder" *ngIf="selectedPhotos.length < 5">
        <ion-icon name="add"></ion-icon>
      </div>
    </div>

    <!-- SEÇÃO INFORMAÇÕES -->
    <div class="section-title">
      <div class="dot"></div>
      <span>Informações do Produto</span>
    </div>

    <div class="form-group">
      <label>Título do Produto</label>
      <div class="input-wrapper">
        <input type="text" formControlName="name" placeholder="Ex: Notebook Acer i5 8GB RAM">
        <ion-icon name="checkmark" color="success" *ngIf="editProductForm.get('name')?.valid"></ion-icon>
      </div>
    </div>

    <div class="form-group">
      <label>Categoria</label>
      <div class="category-breadcrumb">
        <ion-icon name="folder-open-outline"></ion-icon>
        <span>Eletrônicos > Computadores > Notebooks</span>
        <button type="button" class="btn-change">ALTERAR</button>
      </div>
    </div>

    <div class="form-group">
      <label>Condição do Produto</label>
      <div class="condition-pills">
        <button type="button" 
                [class.active]="editProductForm.get('condition')?.value === 'novo'"
                (click)="editProductForm.patchValue({condition: 'novo'})">
          <ion-icon name="add-circle" *ngIf="editProductForm.get('condition')?.value === 'novo'"></ion-icon>
          Novo
        </button>
        <button type="button"
                [class.active]="editProductForm.get('condition')?.value === 'usado'"
                (click)="editProductForm.patchValue({condition: 'usado'})">
          Usado
        </button>
        <button type="button"
                [class.active]="editProductForm.get('condition')?.value === 'semi-novo'"
                (click)="editProductForm.patchValue({condition: 'semi-novo'})">
          Semi-novo
        </button>
      </div>
    </div>

    <!-- SEÇÃO PREÇO E ESTOQUE -->
    <div class="section-title">
      <div class="dot"></div>
      <span>Preço e Estoque</span>
    </div>

    <div class="row">
      <div class="form-group col">
        <label>Preço</label>
        <div class="input-wrapper price-input">
          <span class="prefix">R$</span>
          <input type="number" formControlName="price" placeholder="0,00">
        </div>
      </div>
      <div class="form-group col">
        <label>Estoque</label>
        <div class="input-wrapper stock-input">
          <input type="number" formControlName="stock" placeholder="1">
          <span class="suffix">unidades</span>
        </div>
      </div>
    </div>

    <div class="toggle-group">
      <div class="toggle-text">
        <label>Aceitar Ofertas?</label>
        <p>Permitir que compradores façam propostas</p>
      </div>
      <ion-toggle color="success" formControlName="acceptOffers"></ion-toggle>
    </div>

    <!-- SEÇÃO DESCRIÇÃO -->
    <div class="section-title">
      <div class="dot"></div>
      <span>Descrição do Produto</span>
    </div>

    <div class="form-group">
      <textarea formControlName="description" rows="6" placeholder="Descreva seu produto em detalhes..."></textarea>
    </div>

    <button type="submit" class="btn-publish" (click)="submit()" [disabled]="!editProductForm.valid">
      <ion-icon name="save-outline"></ion-icon>
      SALVAR ALTERAÇÕES
    </button>

    <button type="button" class="btn-cancel-edit" (click)="onCancel()">
      VOLTAR AO SELETOR
    </button>

    <div class="footer-info">
      <ion-icon name="shield-checkmark-outline" color="success"></ion-icon>
      <span>Suas edições são aplicadas instantaneamente!</span>
    </div>
  </form>
</div>
