<ion-header class="ion-no-border">
  <app-mini-header [showBackButton]="true" [showMenuButton]="false" backUrl="/tabs/chats" [useChatIcon]="true"></app-mini-header>
  <ion-toolbar class="title-toolbar">
    <div class="header-profile" *ngIf="otherParticipant" style="padding: 0 16px; display: flex; align-items: center; gap: 12px;">
      <ion-avatar style="width: 40px; height: 40px;">
        <img [src]="otherParticipant.photoUrl || 'assets/imagens/foto-henrique.jpeg'">
      </ion-avatar>
      <div class="header-info">
        <h2 style="margin: 0; font-size: 16px; font-weight: 600;">{{ otherParticipant.name || 'Usuário Compraki' }}</h2>
        <p *ngIf="chatRoom?.productName" style="margin: 2px 0 0; font-size: 12px; color: var(--ion-color-medium);">{{ chatRoom?.productName }}</p>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content color="light" class="chat-content">
  <div class="loading-state" *ngIf="isLoading">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div class="messages-container" *ngIf="!isLoading">
    <!-- Context Indicator -->
    <div class="chat-context-card" *ngIf="chatRoom?.productName">
      <p>Você iniciou o chat sobre:</p>
      <strong>{{ chatRoom?.productName }}</strong>
    </div>

    <!-- Bubbles -->
    <div *ngFor="let msg of messages" 
         class="message-wrapper" 
         [ngClass]="{'mine': msg.senderId === currentUserId, 'theirs': msg.senderId !== currentUserId}">
      <div class="message-bubble">
        <p>{{ msg.text }}</p>
        <span class="message-time">{{ formatTime(msg.createdAt) }}</span>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="message-input-toolbar">
    <div class="input-container">
      <ion-input 
        [(ngModel)]="newMessage" 
        (keyup.enter)="sendMessage()"
        placeholder="Digite uma mensagem..."
        type="text">
      </ion-input>
      <ion-button fill="clear" (click)="sendMessage()" [disabled]="!newMessage.trim()">
        <ion-icon name="send" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
