<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Mensagens</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  <!-- Loading -->
  <div class="loading-state" *ngIf="isLoading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Carregando conversas...</p>
  </div>

  <!-- Vazio -->
  <div class="empty-state" *ngIf="!isLoading && chats.length === 0">
    <div class="icon-circle">
       <ion-icon name="chatbubbles-outline"></ion-icon>
    </div>
    <h2>Nenhuma conversa</h2>
    <p>Você ainda não iniciou bate-papos com nenhum vendedor ou comprador.</p>
  </div>

  <!-- Lista Rápida -->
  <ion-list lines="full" *ngIf="!isLoading && chats.length > 0" class="chat-list">
    <ion-item *ngFor="let chat of chats" button detail="false" (click)="openChat(chat.id)">
      <!-- Avatar -->
      <ion-avatar slot="start">
        <img [src]="getOtherParticipant(chat)?.photoUrl || 'assets/imagens/foto-henrique.jpeg'" alt="avatar">
      </ion-avatar>
      
      <!-- Content -->
      <ion-label>
        <div class="header-row">
           <h2>{{ getOtherParticipant(chat)?.name || 'Usuário Compraki' }}</h2>
           <ion-note slot="end">{{ formatDate(chat.lastMessageAt) }}</ion-note>
        </div>
        
        <div class="product-context" *ngIf="chat.productName">
            Sobre: {{ chat.productName }}
        </div>
        
        <p class="last-msg">
          {{ chat.lastMessage }}
        </p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
