<!-- DASHBOARD STATS HERO -->
<div class="section-title poppins" *ngIf="!isLoading">Visão Geral de Inventário</div>
<div class="stats-hero-grid" *ngIf="!isLoading">
  <app-admin-metric-card
    label="Itens Totais"
    [value]="stats.totalItems"
    icon="cube-outline"
    type="default"
    delay="0s">
  </app-admin-metric-card>
  
  <app-admin-metric-card
    label="Valor Estimado"
    [value]="'R$' + (stats.totalValue | number:'1.2-2')"
    icon="cash-outline"
    type="default"
    delay="0.1s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Novos"
    [value]="stats.newItems"
    icon="sparkles-outline"
    type="default"
    delay="0.2s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Esgotados"
    [value]="stats.outOfStockItems"
    icon="close-circle-outline"
    type="danger"
    delay="0.3s">
  </app-admin-metric-card>
</div>

<!-- DASHBOARD FINANCIAL STATS -->
<div class="section-title poppins" *ngIf="!isLoading">Análise Financeira</div>
<div class="stats-hero-grid financial-grid" *ngIf="!isLoading">
  <app-admin-metric-card
    label="Ticket Médio"
    [value]="'R$' + (financialStats.avgTicket | number:'1.2-2')"
    icon="pricetag-outline"
    type="financial"
    delay="0.4s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Receita Vendida"
    [value]="'R$' + (financialStats.soldRevenue | number:'1.2-2')"
    icon="trending-up-outline"
    type="financial"
    delay="0.5s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Unidades Vendidas"
    [value]="financialStats.unitsSold"
    icon="bag-check-outline"
    type="financial"
    delay="0.6s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Valor em Estoque"
    [value]="'R$' + (financialStats.stockValue | number:'1.2-2')"
    icon="wallet-outline"
    type="financial"
    delay="0.7s">
  </app-admin-metric-card>
</div>

<!-- DASHBOARD SHIPPING STATS -->
<div class="section-title poppins" *ngIf="!isLoading">Status de Envios</div>
<div class="stats-hero-grid shipping-grid" *ngIf="!isLoading">
  <app-admin-metric-card
    label="Aguardando Entrega"
    [value]="shippingStats.pendingDelivery"
    icon="car-outline"
    type="shipping"
    delay="0.8s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Entregas Atrasadas"
    [value]="shippingStats.lateDelivery"
    icon="alert-circle-outline"
    type="shipping"
    delay="0.9s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Atrasam Hoje"
    [value]="shippingStats.lateToday"
    icon="stopwatch-outline"
    type="shipping"
    delay="1.0s">
  </app-admin-metric-card>

  <app-admin-metric-card
    label="Renda Retida (Pendente)"
    [value]="'R$' + (shippingStats.pendingValue | number:'1.2-2')"
    icon="cash-outline"
    type="shipping"
    delay="1.1s">
  </app-admin-metric-card>
</div>
