<div class="admin-subtabs" role="tablist">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="subtab-button"
      role="tab"
      [attr.aria-selected]="activeTab === option.value"
      [class.active]="activeTab === option.value"
      (click)="selectTab(option.value)">
      @if (option.icon) {
        <ion-icon [name]="option.icon"></ion-icon>
      }
      {{ option.label }}
    </button>
  }
</div>
